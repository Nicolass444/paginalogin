<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
 <style>
       .card {
        margin: auto;
            border-radius: 20px; 
            overflow: auto;
        }
     
        .btn-custom-purple {
            background-color: #5f2c82;
            color: white;
            border: none;
        }
        .btn-custom-purple:hover {
            background-color: #7a3bad;
            color: white;
        }
        .card-img-left-cover {
            object-fit: cover;
            height: 100%;
            width: 100%;
        }
     body {
  height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #5f2c82;
}
    </style>
</head>


<body>
<main class="container">
<div class="row justify-content-center">
<div class="col-12 col-md-10 col-lg-8">
 <div class="card shadow-lg border-0">
<div class="row g-0">
                    
<div class="col-md-6 d-none d-md-block">
<img src="metal.jpg" alt="Fundo Abstrato Roxo" class="card-img-left-cover">
</div>

 <div class="col-12 col-md-6 d-flex align-items-center">
 <div class="card-body p-4 p-lg-5">
                            
 <h1 class="card-title text-center mb-3">Login</h1>
<p class="card-text text-muted text-center mb-4" style="font-size: 0.9rem;">
 Seja bem-vindo(a). Faça seu login para acessar sua conta
</p>

                                
<div class="input-group mb-3">
<span class="input-group-text bg-white border-end-0 text-muted" id="basic-addon1">
<i class="bi bi-person-fill"></i> </span>
<input type="email" class="form-control border-start-0 ps-0" name="login" id="ilogin" 
placeholder="Seu e-mail" aria-label="Login" aria-describedby="basic-addon1" required maxlength="30">
</div>

<div class="input-group mb-4">
<span class="input-group-text bg-white border-end-0 text-muted" id="basic-addon2">
<i class="bi bi-key-fill"></i> </span>
<input type="password" class="form-control border-start-0 ps-0" 
name="senha" id="isenha" placeholder="Sua senha" aria-label="Senha" aria-describedby="basic-addon2" 
required minlength="8" maxlength="20">
</div>

<div class="d-grid gap-2 mb-3">
<input type="submit" class="btn btn-custom-purple btn-lg fs-6" value="Entrar">
</div>
</a>
</div>
</form>
</main>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
